spring:
  application:
    name: "E Commerce Application"

  # MySQL connection
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerceapp_db
    username: root
    password: root

    # JDBC driver
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA & Hibernate
  jpa:
    show-sql: true
  
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

        # Optional: Logging SQL with formatting
        format_sql: true
jwt:
  secret: myVeryLongSecretKeyForJwtTokenGeneration123456789
  expiration: 3600000